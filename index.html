<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div>
          <h1 class="site-title">Onlynoer's Portfolio</h1>
          <p class="site-sub">Click a project to learn more about it!</p>
        </div>
        <div class="controls" aria-hidden="false">
          <label for="theme-select" class="visually-hidden">Theme</label>
          <select id="theme-select" title="Choose theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="neon">Neon</option>
            <option value="earth">Earth</option>
          </select>

          <label for="layout-toggle" class="visually-hidden">Layout</label>
          <button id="layout-toggle" title="Toggle layout">Grid</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="projects" class="projects" aria-live="polite"></section>
      <aside id="project-detail" class="project-detail hidden" aria-hidden="true"></aside>
    </main>

    <!-- Image viewer modal -->
    <div id="viewer" class="viewer hidden" role="dialog" aria-modal="true">
      <button id="viewer-close" class="viewer-close" aria-label="Close viewer">✕</button>
      <button id="viewer-prev" class="viewer-nav viewer-prev" aria-label="Previous">◀</button>
      <img id="viewer-img" class="viewer-img" alt="Project image" />
      <button id="viewer-next" class="viewer-nav viewer-next" aria-label="Next">▶</button>
    </div>

    <script src="js/app.js" defer></script>
  </body>
</html>
